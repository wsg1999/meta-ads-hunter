name: Shopify Product Importer

on:
  # Ejecutar manual cuando quieras importar
  workflow_dispatch:
    inputs:
      max_products:
        description: 'Cuántos productos importar (máx 10)'
        required: false
        default: '5'

  # O automático cada día a las 15:00 hora España (13:00 UTC) — después del hunter
  schedule:
    - cron: "0 13 * * *"

jobs:
  import-to-shopify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic aiohttp gspread google-auth

      - name: Run Shopify Importer
        env:
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_SHEET_ID:        ${{ secrets.GOOGLE_SHEET_ID }}
          SHOPIFY_ACCESS_TOKEN:   ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          SHOPIFY_STORE_URL:      ${{ secrets.SHOPIFY_STORE_URL }}
          MAX_PRODUCTS:           ${{ github.event.inputs.max_products || '5' }}
        run: |
          python -c "
          import asyncio, os
          from agents.shopify_importer import run_importer
          max_p = int(os.environ.get('MAX_PRODUCTS', 5))
          asyncio.run(run_importer(max_to_import=max_p))
          "
